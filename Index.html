<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDQS Financial Tracker</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- html2pdf.js for Client-Side PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-emerald-600 text-white shadow-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-3">
      <div class="flex items-center gap-3">
        <div class="bg-white/15 p-2 rounded-lg">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z"></path></svg>
        </div>
        <div>
          <h1 class="text-lg font-bold tracking-tight">TDQS Financial Tracker</h1>
          <p class="text-xs text-emerald-100 font-medium">Thulir Design & QS Services • Web App</p>
        </div>
      </div>
      <div id="sync-badge" class="text-xs bg-emerald-700/80 px-3 py-1 rounded-full flex items-center gap-1.5 border border-emerald-500/30">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
        <span>Connected to Google Sheets</span>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="flex-grow max-w-7xl w-full mx-auto p-4 flex flex-col gap-6">
    <!-- Tab Navigation -->
    <div class="bg-white p-1 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-1 z-30">
      <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-4 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 cursor-pointer bg-slate-100 text-slate-800">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"></path></svg>
        Dashboard
      </button>
      <button onclick="switchTab('expenses')" id="tab-expenses" class="px-4 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 cursor-pointer text-slate-500 hover:bg-slate-50">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        All Expenses
      </button>
      <button onclick="switchTab('contractors')" id="tab-contractors" class="px-4 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 cursor-pointer text-slate-500 hover:bg-slate-50">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        Contractor Ledgers
      </button>
      <button onclick="switchTab('add-data')" id="tab-add-data" class="px-4 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 cursor-pointer text-slate-500 hover:bg-slate-50">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        Add Data
      </button>
      <button onclick="switchTab('pdf-export')" id="tab-pdf-export" class="px-4 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 cursor-pointer text-slate-500 hover:bg-slate-50">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
        PDF Statements
      </button>
    </div>

    <!-- Alert / Toast Banner Container -->
    <div id="alert-container" class="hidden"></div>

    <!-- Dynamic Screen Content -->
    <div id="screen-content" class="min-h-[400px]">
      <!-- Loaded dynamically via javascript -->
      <div class="flex items-center justify-center h-64">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-emerald-500 border-t-transparent"></div>
      </div>
    </div>
  </main>

  <!-- Edit Row Modal (Shared dynamically) -->
  <div id="edit-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl max-w-lg w-full shadow-xl border border-slate-200 overflow-hidden">
      <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
        <h3 id="edit-modal-title" class="font-bold text-slate-800 text-lg">Edit Transaction</h3>
        <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600 cursor-pointer">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <form id="edit-modal-form" onsubmit="handleEditFormSubmit(event)" class="p-6 space-y-4">
        <!-- Form elements generated dynamically -->
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-white border-t border-slate-200 mt-12 py-6 text-center text-xs text-slate-400">
    <div class="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-3">
      <div>© 2026 Thulir Design & QS Services. Built for Google Sheets integration.</div>
      <div class="font-mono text-[10px]">v2.1.0 • Pure Apps Script Client</div>
    </div>
  </footer>

  <!-- Complete Application JavaScript Logic -->
  <script>
    // ----------------------------------------------------
    // GOOGLE APPS SCRIPT COMPATIBILITY LAYER
    // ----------------------------------------------------
    if (typeof google === 'undefined' || !google.script || !google.script.run) {
      document.getElementById('sync-badge').innerHTML = `
        <span class="w-2 h-2 rounded-full bg-amber-400"></span>
        <span class="text-amber-100 font-medium">Local Mock Environment</span>
      `;
      document.getElementById('sync-badge').className = "text-xs bg-amber-800/80 px-3 py-1 rounded-full flex items-center gap-1.5 border border-amber-600/30";
      
      // Implement Client Emulator for Live Preview
      window.google = {
        script: {
          run: {
            withSuccessHandler: function(onSuccess) {
              this._onSuccess = onSuccess;
              return this;
            },
            withFailureHandler: function(onFailure) {
              this._onFailure = onFailure;
              return this;
            },
            getAllData: function() {
              const self = this;
              fetch('/api/data')
                .then(res => res.json())
                .then(data => { if (self._onSuccess) self._onSuccess(data); })
                .catch(err => { if (self._onFailure) self._onFailure(err); });
            },
            appendRow: function(sheetName, rowData) {
              const self = this;
              const route = sheetName === 'Contractors' ? 'contractors' :
                            sheetName === 'Projects' ? 'projects' :
                            sheetName === 'Income' ? 'income' : 'expenses';
              fetch('/api/' + route, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(rowData)
              })
                .then(res => res.json())
                .then(resData => { if (self._onSuccess) self._onSuccess({ success: true, data: resData }); })
                .catch(err => { if (self._onFailure) self._onFailure(err); });
            },
            updateRow: function(sheetName, id, rowData) {
              const self = this;
              const route = sheetName === 'Income' ? 'income' : 'expenses';
              fetch('/api/' + route + '/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(rowData)
              })
                .then(res => res.json())
                .then(resData => { if (self._onSuccess) self._onSuccess({ success: true, data: resData }); })
                .catch(err => { if (self._onFailure) self._onFailure(err); });
            },
            deleteRow: function(sheetName, id) {
              const self = this;
              const route = sheetName === 'Income' ? 'income' : 'expenses';
              fetch('/api/' + route + '/' + id, { method: 'DELETE' })
                .then(res => res.json())
                .then(resData => { if (self._onSuccess) self._onSuccess({ success: true }); })
                .catch(err => { if (self._onFailure) self._onFailure(err); });
            },
            generatePDF: function(options) {
              // Standard client side pdf mockup fallback
              if (this._onSuccess) {
                this._onSuccess({ success: true, base64Data: '', isMock: true });
              }
            }
          }
        }
      };
    }

    // ----------------------------------------------------
    // APPLICATION STATE MANAGEMENT
    // ----------------------------------------------------
    let state = {
      contractors: [],
      projects: [],
      income: [],
      expenses: [],
      activeTab: 'dashboard',
      selectedContractorId: '', // For dynamic ledger screens
      sort: {
        field: 'date',
        asc: false,
        sheet: 'expenses'
      },
      filters: {
        text: '',
        contractor: '',
        project: '',
        currency: ''
      }
    };

    // Initialize application and fetch data
    function init() {
      fetchData();
    }

    function fetchData() {
      google.script.run
        .withSuccessHandler(function(response) {
          state.contractors = response.contractors || [];
          state.projects = response.projects || [];
          state.income = response.income || [];
          state.expenses = response.expenses || [];
          
          if (state.contractors.length > 0 && !state.selectedContractorId) {
            state.selectedContractorId = state.contractors[0].id;
          }
          
          renderCurrentScreen();
        })
        .withFailureHandler(function(err) {
          showNotification('Failed to load data from spreadsheet: ' + err.message, 'error');
        })
        .getAllData();
    }

    // ----------------------------------------------------
    // VIEW CONTROLLER
    // ----------------------------------------------------
    function switchTab(tabId) {
      state.activeTab = tabId;
      
      // Update UI active tab buttons
      ['dashboard', 'expenses', 'contractors', 'add-data', 'pdf-export'].forEach(t => {
        const btn = document.getElementById('tab-' + t);
        if (t === tabId) {
          btn.className = "px-4 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 cursor-pointer bg-emerald-50 text-emerald-700 border border-emerald-100 shadow-sm";
        } else {
          btn.className = "px-4 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 cursor-pointer text-slate-500 hover:bg-slate-50";
        }
      });
      
      renderCurrentScreen();
    }

    function renderCurrentScreen() {
      const contentDiv = document.getElementById('screen-content');
      
      if (state.activeTab === 'dashboard') {
        renderDashboard(contentDiv);
      } else if (state.activeTab === 'expenses') {
        renderExpenses(contentDiv);
      } else if (state.activeTab === 'contractors') {
        renderContractors(contentDiv);
      } else if (state.activeTab === 'add-data') {
        renderAddData(contentDiv);
      } else if (state.activeTab === 'pdf-export') {
        renderPdfExport(contentDiv);
      }
    }

    // ----------------------------------------------------
    // CURRENCY FORMATTER
    // ----------------------------------------------------
    function formatCurrency(amount, currency) {
      const val = Number(amount) || 0;
      const formatted = val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (currency === 'INR') {
        return '₹' + formatted;
      }
      return formatted + ' AED';
    }

    // Helper to format Date Strings cleanly (e.g. 2026-07-15 -> 15 Jul 2026)
    function formatDateCleanly(dateStr) {
      if (!dateStr) return '';
      try {
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return d.getDate().toString().padStart(2, '0') + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
      } catch(e) {
        return dateStr;
      }
    }

    // ----------------------------------------------------
    // TOAST NOTIFICATIONS
    // ----------------------------------------------------
    function showNotification(message, type = 'success') {
      const container = document.getElementById('alert-container');
      container.classList.remove('hidden');
      
      const isError = type === 'error';
      const isWarning = type === 'warning';
      
      let bg = 'bg-emerald-50 border-emerald-200 text-emerald-800';
      let icon = `<svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
      
      if (isError) {
        bg = 'bg-rose-50 border-rose-200 text-rose-800';
        icon = `<svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
      } else if (isWarning) {
        bg = 'bg-amber-50 border-amber-200 text-amber-800';
        icon = `<svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
      }
      
      container.innerHTML = `
        <div class="flex items-center gap-3 p-4 border rounded-xl shadow-sm ${bg} transition-all duration-300">
          ${icon}
          <div class="flex-grow text-sm font-semibold">${message}</div>
          <button onclick="document.getElementById('alert-container').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 focus:outline-none cursor-pointer">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
      `;
      
      if (!isWarning) {
        setTimeout(() => {
          container.classList.add('hidden');
        }, 5000);
      }
    }

    // ----------------------------------------------------
    // SCREEN 1: DASHBOARD
    // ----------------------------------------------------
    function renderDashboard(container) {
      // Aggregate statistics (Convert all INR to AED at a mock conversion rate of 1 AED = 22.5 INR if combined, or show separately)
      // We will show them grouped by currency for accuracy
      let totalAEDInc = 0;
      let totalAEDExp = 0;
      let receivedAEDInc = 0;
      let paidAEDExp = 0;

      let totalINRInc = 0;
      let totalINRExp = 0;
      let receivedINRInc = 0;
      let paidINRExp = 0;

      state.income.forEach(item => {
        const amt = Number(item.amount) || 0;
        const rec = Number(item.creditReceived) || 0;
        if (item.currency === 'INR') {
          totalINRInc += amt;
          receivedINRInc += rec;
        } else {
          totalAEDInc += amt;
          receivedAEDInc += rec;
        }
      });

      state.expenses.forEach(item => {
        const amt = Number(item.amount) || 0;
        const paid = Number(item.creditPaid) || 0;
        if (item.currency === 'INR') {
          totalINRExp += amt;
          paidINRExp += paid;
        } else {
          totalAEDExp += amt;
          paidAEDExp += paid;
        }
      });

      const pendingAEDInc = totalAEDInc - receivedAEDInc;
      const pendingAEDExp = totalAEDExp - paidAEDExp;

      const netProfitAED = totalAEDInc - totalAEDExp;
      const profitMarginAED = totalAEDInc > 0 ? (netProfitAED / totalAEDInc) * 100 : 0;

      container.innerHTML = `
        <div class="space-y-6">
          <!-- Summary Grid -->
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
              <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Total Invoiced (Income)</span>
              <div>
                <span class="text-2xl font-black text-slate-800 block">${formatCurrency(totalAEDInc, 'AED')}</span>
                <span class="text-sm font-semibold text-slate-400 font-mono block mt-1">${formatCurrency(totalINRInc, 'INR')}</span>
              </div>
            </div>
            
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
              <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Total Invoiced (Expenses)</span>
              <div>
                <span class="text-2xl font-black text-rose-600 block">${formatCurrency(totalAEDExp, 'AED')}</span>
                <span class="text-sm font-semibold text-rose-400 font-mono block mt-1">${formatCurrency(totalINRExp, 'INR')}</span>
              </div>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
              <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Pending Income</span>
              <div>
                <span class="text-2xl font-black text-amber-600 block">${formatCurrency(pendingAEDInc, 'AED')}</span>
                <span class="text-sm font-semibold text-slate-500 font-mono block mt-1">Pending Payables: ${formatCurrency(pendingAEDExp, 'AED')}</span>
              </div>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between ${netProfitAED >= 0 ? 'bg-emerald-50/20 border-emerald-100' : 'bg-rose-50/20 border-rose-100'}">
              <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Operating Net Profit</span>
              <div>
                <span class="text-2xl font-black ${netProfitAED >= 0 ? 'text-emerald-700' : 'text-rose-700'} block">${formatCurrency(netProfitAED, 'AED')}</span>
                <span class="text-sm font-semibold text-slate-500 font-sans block mt-1">Margin: ${profitMarginAED.toFixed(1)}%</span>
              </div>
            </div>
          </div>

          <!-- Charts -->
          <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <h3 class="font-bold text-slate-800 text-base mb-4">Monthly Financial Statement (FY 2025 - 2026)</h3>
            <div class="h-80 w-full relative">
              <canvas id="dashboardChart"></canvas>
            </div>
          </div>
        </div>
      `;

      // Build Monthly Chart (FY starts April to March or generic Calendar grouping)
      const monthsLabel = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const monthlyIncome = Array(12).fill(0);
      const monthlyExpenses = Array(12).fill(0);

      state.income.forEach(item => {
        try {
          const d = new Date(item.date);
          if (!isNaN(d.getTime())) {
            // Convert to AED equivalent for chart simple representation
            const rate = item.currency === 'INR' ? 1/22.5 : 1;
            monthlyIncome[d.getMonth()] += (Number(item.amount) || 0) * rate;
          }
        } catch(e){}
      });

      state.expenses.forEach(item => {
        try {
          const d = new Date(item.date);
          if (!isNaN(d.getTime())) {
            const rate = item.currency === 'INR' ? 1/22.5 : 1;
            monthlyExpenses[d.getMonth()] += (Number(item.amount) || 0) * rate;
          }
        } catch(e){}
      });

      const ctx = document.getElementById('dashboardChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: monthsLabel,
          datasets: [
            {
              label: 'Income (AED Eqv)',
              data: monthlyIncome,
              backgroundColor: '#10b981',
              borderRadius: 4
            },
            {
              label: 'Expenses (AED Eqv)',
              data: monthlyExpenses,
              backgroundColor: '#f43f5e',
              borderRadius: 4
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: '#f1f5f9' },
              ticks: { font: { family: 'Inter' } }
            },
            x: {
              grid: { display: false },
              ticks: { font: { family: 'Inter' } }
            }
          },
          plugins: {
            legend: {
              labels: { font: { family: 'Inter', weight: 500 } }
            }
          }
        }
      });
    }

    // ----------------------------------------------------
    // SCREEN 2: ALL EXPENSES
    // ----------------------------------------------------
    function renderExpenses(container) {
      let filtered = [...state.expenses];
      
      // Text Filter
      if (state.filters.text) {
        const text = state.filters.text.toLowerCase();
        filtered = filtered.filter(item => 
          (item.description || '').toLowerCase().includes(text) ||
          (item.vendor || '').toLowerCase().includes(text) ||
          (item.projectCode || '').toLowerCase().includes(text)
        );
      }

      // Dropdown Filters
      if (state.filters.contractor) {
        filtered = filtered.filter(item => item.contractorId === state.filters.contractor);
      }
      if (state.filters.project) {
        filtered = filtered.filter(item => item.projectCode === state.filters.project);
      }
      if (state.filters.currency) {
        filtered = filtered.filter(item => item.currency === state.filters.currency);
      }

      // Sort
      const field = state.sort.field;
      const asc = state.sort.asc;
      filtered.sort((a, b) => {

          return asc ? new Date(valA) - new Date(valB) : new Date(valB) - new Date(valA);

        if (field === 'amount' || field === 'creditPaid') {
          return asc ? Number(valA) - Number(valB) : Number(valB) - Number(valA);
        }
        return asc ? valA.toString().localeCompare(valB.toString()) : valB.toString().localeCompare(valA.toString());
      });

      let contractorOptions = state.contractors.map(c => `<option value="${c.id}" ${state.filters.contractor === c.id ? 'selected' : ''}>${c.name}</option>`).join('');

                Export CSV

            </div>
          </div>

          <!-- Table -->

                  <tr class="bg-slate-50 border-b border-slate-200 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                    <th onclick="toggleSort('date')" class="p-4 cursor-pointer hover:bg-slate-100 transition-colors">Date ${getSortIndicator('date')}</th>
                    <th onclick="toggleSort('contractorId')" class="p-4 cursor-pointer hover:bg-slate-100 transition-colors">Contractor ${getSortIndicator('contractorId')}</th>
                    <th onclick="toggleSort('projectCode')" class="p-4 cursor-pointer hover:bg-slate-100 transition-colors">Project ${getSortIndicator('projectCode')}</th>
                    <th onclick="toggleSort('vendor')" class="p-4 cursor-pointer hover:bg-slate-100 transition-colors">Vendor ${getSortIndicator('vendor')}</th>
                    <th onclick="toggleSort('description')" class="p-4 cursor-pointer hover:bg-slate-100 transition-colors">Description ${getSortIndicator('description')}</th>
                    <th onclick="toggleSort('amount')" class="p-4 text-right cursor-pointer hover:bg-slate-100 transition-colors">Amount ${getSortIndicator('amount')}</th>
                    <th onclick="toggleSort('creditPaid')" class="p-4 text-right cursor-pointer hover:bg-slate-100 transition-colors">Paid ${getSortIndicator('creditPaid')}</th>

    function updateFilter(key, val) {
      state.filters[key] = val;

    function toggleSort(field) {
      if (state.sort.field === field) {
        state.sort.asc = !state.sort.asc;
      } else {
        state.sort.field = field;
        state.sort.asc = true;
      }
      renderCurrentScreen();
    }

    function getSortIndicator(field) {
      if (state.sort.field !== field) return '';
      return state.sort.asc ? '▲' : '▼';
    }

        runningInc = runningInc + amt - rec;
        return { ...item, running: runningInc };

                </div>

      container.innerHTML = `

    // ----------------------------------------------------
    // REAL-TIME AUTOCOMPLETE INVOICE SUGGESTION
    // ----------------------------------------------------
    let suggestionTimeout = null;

    function recalculateInvoiceSuggestion() {
      const dateVal = document.getElementById('add-inc-date').value;
      const contractorId = document.getElementById('add-inc-contractor').value;
      
      const suggestContainer = document.getElementById('invoice-suggestion-container');
      const suggestSpinner = document.getElementById('invoice-suggestion-spinner');
      const suggestText = document.getElementById('invoice-suggestion-text');
      
      if (!dateVal || !contractorId) {
        suggestContainer.classList.add('hidden');
        return;
      }
      
      suggestContainer.classList.remove('hidden');
      suggestSpinner.classList.remove('hidden');
      suggestText.classList.add('hidden');
      
      if (suggestionTimeout) clearTimeout(suggestionTimeout);
      
      // Calculate suggestion instantly but hold loader for exactly 500ms (half second)
      suggestionTimeout = setTimeout(() => {
        const contractor = state.contractors.find(c => c.id === contractorId);
        let abbr = "CON";
        if (contractor) {
          if (contractor.id === "C001") abbr = "ALG";
          else if (contractor.id === "C002") abbr = "DNB";
          else if (contractor.id === "C003") abbr = "NAS";
          else {
            const cleaned = contractor.name.replace(/[^a-zA-Z\s]/g, "").trim();
            const words = cleaned.split(/\s+/);
            if (words.length >= 3) {
              abbr = (words[0][0] + words[1][0] + words[2][0]).toUpperCase();
            } else if (words.length === 2) {
              abbr = (words[0].substring(0, 2) + words[1][0]).toUpperCase();
            } else if (words[0]) {
              abbr = words[0].substring(0, 3).toUpperCase().padEnd(3, "X");
            }
          }
        }

        let yy = "YY";
        let mm = "MM";
        let targetYear = 0;
        let targetMonth = 0;
        try {
          const d = new Date(dateVal);
          if (!isNaN(d.getTime())) {
            targetYear = d.getFullYear();
            targetMonth = d.getMonth();
            yy = targetYear.toString().slice(-2);
            mm = (targetMonth + 1).toString().padStart(2, '0');
          }
        } catch(e){}

        // Check sequence based on current month/year and contractor
        const matchedInvoices = state.income.filter(item => {
          if (item.contractorId !== contractorId) return false;
          const desc = item.description || "";
          if (!desc.toUpperCase().includes("TDQS") && !desc.toUpperCase().includes("INV")) return false;
          try {
            const d = new Date(item.date);
            return d.getFullYear() === targetYear && d.getMonth() === targetMonth;
          } catch(e) { return false; }
        });

        let maxSeq = 0;
        matchedInvoices.forEach(item => {
          const match = item.description.match(/[_-]0*(\d+)$/) || item.description.match(/\/0*(\d+)$/) || item.description.match(/0*(\d+)$/);
          if (match) {
            const num = parseInt(match[1], 10);
            if (!isNaN(num) && num > maxSeq) maxSeq = num;
          }
        });

        const nextSeq = (maxSeq + 1).toString().padStart(3, '0');
        const suggestion = `TDQS-INV-${yy}${mm}-${abbr}_${nextSeq}`;

        suggestSpinner.classList.add('hidden');
        suggestText.classList.remove('hidden');
        suggestText.innerHTML = `
          <button type="button" onclick="applyInvoiceSuggestion('${suggestion}')" class="text-emerald-700 hover:text-emerald-900 font-bold font-mono hover:underline cursor-pointer focus:outline-none">
            ${suggestion} <span class="text-[9px] font-sans font-semibold text-emerald-500">(Apply)</span>
          </button>
        `;
      }, 500);
    }

    function applyInvoiceSuggestion(suggestion) {
      const descInput = document.getElementById('add-inc-desc');
      if (descInput) {
        descInput.value = suggestion;
        showNotification('Invoice Suggestion applied successfully!', 'success');
      }
    }

    // ----------------------------------------------------
    // REAL-TIME DUPLICATE WARNING
    // ----------------------------------------------------
    function checkDuplicateWarning(type) {
      if (type === 'Income') {
        const date = document.getElementById('add-inc-date').value;
        const contractorId = document.getElementById('add-inc-contractor').value;
        const projectCode = document.getElementById('add-inc-project').value;
        const amount = Number(document.getElementById('add-inc-amount').value) || 0;
        const warning = document.getElementById('duplicate-warning-inc');
        
        if (!date || !contractorId || !projectCode || !amount) {
          warning.classList.add('hidden');
          return;
        }

        const isDuplicate = state.income.some(item => 
          item.date === date && 
          item.contractorId === contractorId && 
          item.projectCode === projectCode && 
          Number(item.amount) === amount
        );

        if (isDuplicate) warning.classList.remove('hidden');
        else warning.classList.add('hidden');
      } else if (type === 'Expenses') {
        const date = document.getElementById('add-exp-date').value;
        const contractorId = document.getElementById('add-exp-contractor').value;
        const projectCode = document.getElementById('add-exp-project').value;
        const amount = Number(document.getElementById('add-exp-amount').value) || 0;
        const warning = document.getElementById('duplicate-warning-exp');
        
        if (!date || !contractorId || !projectCode || !amount) {
          warning.classList.add('hidden');
          return;
        }

        const isDuplicate = state.expenses.some(item => 
          item.date === date && 
          item.contractorId === contractorId && 
          item.projectCode === projectCode && 
          Number(item.amount) === amount
        );

        if (isDuplicate) warning.classList.remove('hidden');
        else warning.classList.add('hidden');
      }
    }

        sheetName = "Expenses";

    // Google Apps Script Server-Side PDF generator
    function handleGASServerPdfExport() {
      const conId = document.getElementById('pdf-contractor').value;
      const projCode = document.getElementById('pdf-project').value;

      showNotification('Triggering Google Spreadsheet server-side PDF compilation...', 'warning');

      google.script.run
        .withSuccessHandler(function(res) {
          if (res.success) {
            if (res.isMock) {
              showNotification('Google Sheet PDF export requires a real sheet connection. Falling back to Client PDF!', 'warning');
              handleClientPdfDownload();
              return;
            }
            // Trigger actual download of the base64 encoded pdf
            const downloadLink = document.createElement("a");
            downloadLink.href = "data:application/pdf;base64," + res.base64Data;
            downloadLink.download = res.fileName;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            showNotification('Google Spreadsheet Statement exported and downloaded successfully!', 'success');
          } else {
            showNotification('Export failed: ' + res.error, 'error');
          }
        })
        .withFailureHandler(function(err) {
          showNotification('GAS Export failed: ' + err.toString(), 'error');
        })
        .generatePDF({ contractorId: conId, projectCode: projCode });
    }

    // ----------------------------------------------------
    // CSV EXPORTER
    // ----------------------------------------------------
    function exportToCSV(type, contractorId = '') {
      let data = [];
      let filename = "";
      
      if (type === 'expenses') {
        data = state.expenses;
        filename = "TDQS_Expenses_Statement.csv";
        if (contractorId) {
          data = data.filter(x => x.contractorId === contractorId);
          filename = `TDQS_Expenses_${contractorId}.csv`;
        }
      } else if (type === 'income') {
        data = state.income;
        filename = "TDQS_Income_Statement.csv";
        if (contractorId) {
          data = data.filter(x => x.contractorId === contractorId);
          filename = `TDQS_Income_${contractorId}.csv`;
        }
      }

      if (data.length === 0) {
        showNotification('No transactions found to export to CSV.', 'error');
        return;
      }

      // Build Headers
      let csvContent = "";
      const keys = Object.keys(data[0]);
      csvContent += keys.join(",") + "\n";

      // Append lines
      data.forEach(item => {
        const row = keys.map(k => {
          let escaped = (item[k] || '').toString().replace(/"/g, '""');
          if (escaped.includes(",") || escaped.includes("\n")) {
            escaped = `"${escaped}"`;
          }
          return escaped;
        });
        csvContent += row.join(",") + "\n";
      });

      // Download
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", filename);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      
      showNotification(`Exported CSV successfully to ${filename}!`, 'success');
    }
